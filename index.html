<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リズム訓練</title>
<link rel="stylesheet" href="./styles.css">
<script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0/build/cjs/vexflow.js"></script>
</head>
<body>
<header class="app-header">
  <h1>リズム訓練</h1>
  <div class="mode-switch" role="tablist" aria-label="モード切替">
    <button id="mode-edit" class="mode-btn active" role="tab" aria-selected="true">Edit</button>
    <button id="mode-train" class="mode-btn" role="tab" aria-selected="false">Train</button>
  </div>
</header>

<section class="transport">
  <button id="play-btn" class="play-btn">▶ Play</button>
  <button id="clear-btn" class="ghost-btn">Clear</button>
  <label class="bpm-label">
    BPM
    <input id="bpm-slider" type="range" min="40" max="240" step="1" value="100">
    <span id="bpm-value">100</span>
  </label>
  <label class="swing-label">
    スイング
    <select id="swing-type">
      <option value="straight">オフ</option>
      <option value="eighth">8分</option>
      <option value="sixteenth">16分</option>
    </select>
  </label>
  <label id="swing-ratio-wrap" class="swing-ratio-label" hidden>
    <input id="swing-ratio" type="range" min="50" max="75" step="1" value="66">
    <span id="swing-ratio-value">66%</span>
  </label>
  <div id="train-controls" class="train-controls" hidden>
    <label>
      お題
      <select id="preset-select">
        <option value="quarter-bass">4分 バスドラ</option>
        <option value="eighth-hat">8分 ハット</option>
        <option value="backbeat">2・4拍スネア</option>
        <option value="basic-rock">ベーシックロック</option>
      </select>
    </label>
    <button id="tap-btn" class="tap-btn">TAP (Space)</button>
    <div class="judge-display">
      <div id="judge-last" class="judge-last">--</div>
      <div class="judge-counts">
        <span>Perfect <b id="cnt-perfect">0</b></span>
        <span>Good <b id="cnt-good">0</b></span>
        <span>Miss <b id="cnt-miss">0</b></span>
      </div>
    </div>
  </div>
</section>

<main>
  <section class="panel">
    <h2>DTM</h2>
    <div id="grid-wrap" class="grid-wrap"></div>
  </section>

  <section class="panel">
    <h2>リズム譜<span id="swing-indicator" class="swing-indicator"></span></h2>
    <div id="score-wrap" class="score-wrap">
      <div id="score"></div>
      <div id="score-head" class="score-head"></div>
    </div>
  </section>
</main>

<footer class="app-footer">
  <small>バニラJS + VexFlow + Web Audio API</small>
</footer>

<script src="./js/pattern.js"></script>
<script src="./js/audio.js"></script>
<script src="./js/ui-grid.js"></script>
<script src="./js/ui-score.js"></script>
<script src="./js/train.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
