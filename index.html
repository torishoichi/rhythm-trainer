<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>リズム訓練</title>
<link rel="stylesheet" href="./styles.css?v=060">
<!-- モバイル用インラインCSS（外部CSSキャッシュに依存しない） -->
<style>
@media (max-width: 640px) {
  html, body { margin:0; padding:0; overflow-x:hidden; overscroll-behavior-y:none; -webkit-tap-highlight-color:transparent; }
  body { touch-action:manipulation; }
  .app-header { padding:6px 10px; border-bottom:none; }
  .app-header h1 { font-size:14px; }
  .transport-desktop { display:none !important; }
  .transport-mobile {
    display:flex !important; align-items:center; justify-content:center; gap:20px;
    position:fixed; bottom:0; left:0; right:0; z-index:100;
    padding:8px 20px; padding-bottom:calc(8px + env(safe-area-inset-bottom, 0px));
    background:var(--panel); border-top:1px solid var(--line); box-shadow:0 -2px 12px rgba(0,0,0,0.06);
  }
  main { padding:4px 0 !important; padding-bottom:84px !important; gap:4px !important; max-width:none !important; }
  .panel { border:none !important; border-radius:0 !important; padding:4px 6px 6px !important; background:transparent !important; }
  .panel-score { border-top:1px solid var(--line) !important; padding-top:6px !important; }
  .panel h2 { margin:0 0 3px !important; font-size:11px !important; padding-left:2px; }
  .score-toggle, .beat-indicator { display:none !important; }
  .panel-header { margin-bottom:0; }
  .grid-wrap { gap:1px; }
  .track-row { gap:2px; }
  .track-label { width:18px; flex-shrink:0; }
  .track-label svg { width:14px; height:14px; }
  .track-cells { height:48px; gap:1px; }
  .grid-cell { min-height:0; border-radius:3px; border-width:0.5px; }
  .grid-cell:active { transform:scale(0.92); }
  .score-wrap { overflow:hidden; max-width:100%; }
  #score { min-height:auto; overflow:hidden; max-width:100%; }
  .app-footer { display:none !important; }
}
@media (max-width: 900px) and (orientation: landscape) {
  .app-header { display:none; }
  .transport-desktop { display:none !important; }
  .transport-mobile {
    display:flex !important; align-items:center; justify-content:center; gap:16px;
    position:fixed; bottom:0; left:0; right:0; z-index:100;
    padding:4px 16px; padding-bottom:calc(4px + env(safe-area-inset-bottom, 0px));
    background:var(--panel); border-top:1px solid var(--line);
  }
  .mob-play-btn { width:40px; height:40px; font-size:16px; }
  html, body { overflow-x:hidden; }
  body { touch-action:manipulation; }
  main { padding:4px !important; padding-bottom:52px !important; max-width:none !important; gap:4px !important; }
  .panel { padding:6px !important; border-radius:8px !important; }
  .panel h2 { margin:0 0 4px; font-size:11px; }
  .grid-wrap { gap:2px; }
  .track-row { gap:2px; }
  .track-cells { height:28px; gap:1px; }
  .track-label { width:18px; }
  .track-label svg { width:14px; height:14px; }
  .grid-cell { min-height:0; border-width:0.5px; }
  .score-wrap { overflow:hidden; max-width:100%; }
  #score { min-height:auto; overflow:hidden; max-width:100%; }
  .app-footer { display:none !important; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0/build/cjs/vexflow.js"></script>
</head>
<body>
<header class="app-header">
  <h1>リズム訓練</h1>
</header>

<!-- デスクトップ用トランスポート -->
<section class="transport transport-desktop">
  <button id="play-btn" class="play-btn">▶ Play</button>
  <button id="clear-btn" class="ghost-btn">Clear</button>
  <label class="bpm-label">
    BPM
    <input id="bpm-slider" type="range" min="40" max="240" step="1" value="100">
    <span id="bpm-value">100</span>
  </label>
  <label class="swing-label">
    スイング
    <select id="swing-type">
      <option value="straight">オフ</option>
      <option value="eighth">8分</option>
      <option value="sixteenth">16分</option>
    </select>
  </label>
  <label id="swing-ratio-wrap" class="swing-ratio-label" hidden>
    <input id="swing-ratio" type="range" min="50" max="75" step="1" value="66">
    <span id="swing-ratio-value">66%</span>
  </label>
</section>

<!-- モバイル用固定ボトムバー -->
<nav class="transport transport-mobile">
  <button id="mob-bpm-badge" class="mob-bpm-badge">♩=<span id="mob-bpm-val">100</span></button>
  <button id="mob-play-btn" class="mob-play-btn">▶</button>
  <button id="mob-settings-btn" class="mob-settings-btn">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="10" cy="10" r="3"/><path d="M10 1v3M10 16v3M1 10h3M16 10h3M3.5 3.5l2 2M14.5 14.5l2 2M3.5 16.5l2-2M14.5 5.5l2-2"/>
    </svg>
  </button>
  <span class="mob-version">v0.6.0</span>
</nav>

<!-- ボトムシート（BPM/Swing/Clear） -->
<div id="sheet-backdrop" class="sheet-backdrop" hidden></div>
<div id="bottom-sheet" class="bottom-sheet" hidden>
  <div class="sheet-handle"></div>
  <div class="sheet-content">
    <label class="sheet-row">
      <span class="sheet-label">BPM</span>
      <input id="sheet-bpm-slider" type="range" min="40" max="240" step="1" value="100">
      <span id="sheet-bpm-value" class="sheet-val">100</span>
    </label>
    <label class="sheet-row">
      <span class="sheet-label">スイング</span>
      <select id="sheet-swing-type">
        <option value="straight">オフ</option>
        <option value="eighth">8分</option>
        <option value="sixteenth">16分</option>
      </select>
    </label>
    <label id="sheet-swing-ratio-wrap" class="sheet-row" hidden>
      <span class="sheet-label">比率</span>
      <input id="sheet-swing-ratio" type="range" min="50" max="75" step="1" value="66">
      <span id="sheet-swing-ratio-value" class="sheet-val">66%</span>
    </label>
    <button id="sheet-clear-btn" class="ghost-btn sheet-clear-btn">パターンをクリア</button>
  </div>
</div>

<main>
  <section class="panel panel-grid">
    <div class="panel-header">
      <h2>DTM</h2>
      <button id="score-toggle" class="score-toggle" hidden>♫ 譜面</button>
    </div>
    <div id="beat-indicator" class="beat-indicator" hidden></div>
    <div id="grid-wrap" class="grid-wrap"></div>
  </section>

  <section id="score-panel" class="panel panel-score">
    <h2>リズム譜<span id="swing-indicator" class="swing-indicator"></span></h2>
    <div id="score-wrap" class="score-wrap">
      <div id="score"></div>
      <div id="score-head" class="score-head"></div>
    </div>
  </section>
</main>

<footer class="app-footer">
  <span class="app-version">v0.6.0</span>
  <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="torisho" data-color="#e4e2da" data-emoji="" data-font="Cookie" data-text="Buy me a coffee" data-outline-color="#e4e2da" data-font-color="#6b6b6b" data-coffee-color="#ffffff"></script>
</footer>

<script src="./js/pattern.js?v=060"></script>
<script src="./js/audio.js?v=060"></script>
<script src="./js/ui-grid.js?v=060"></script>
<script src="./js/ui-score.js?v=060"></script>
<script src="./js/app.js?v=060"></script>
</body>
</html>
