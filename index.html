<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リズム訓練</title>
<link rel="stylesheet" href="./styles.css">
<script src="https://cdn.jsdelivr.net/npm/vexflow@5.0.0/build/cjs/vexflow.js"></script>
</head>
<body>
<header class="app-header">
  <h1>リズム訓練</h1>
</header>

<section class="transport">
  <button id="play-btn" class="play-btn">▶ Play</button>
  <button id="clear-btn" class="ghost-btn">Clear</button>
  <label class="bpm-label">
    BPM
    <input id="bpm-slider" type="range" min="40" max="240" step="1" value="100">
    <span id="bpm-value">100</span>
  </label>
  <label class="swing-label">
    スイング
    <select id="swing-type">
      <option value="straight">オフ</option>
      <option value="eighth">8分</option>
      <option value="sixteenth">16分</option>
    </select>
  </label>
  <label id="swing-ratio-wrap" class="swing-ratio-label" hidden>
    <input id="swing-ratio" type="range" min="50" max="75" step="1" value="66">
    <span id="swing-ratio-value">66%</span>
  </label>
</section>

<main>
  <section class="panel">
    <h2>DTM</h2>
    <div id="grid-wrap" class="grid-wrap"></div>
  </section>

  <section class="panel">
    <h2>リズム譜<span id="swing-indicator" class="swing-indicator"></span></h2>
    <div id="score-wrap" class="score-wrap">
      <div id="score"></div>
      <div id="score-head" class="score-head"></div>
    </div>
  </section>
</main>

<footer class="app-footer">
  <small>ベンガル鳥</small>
  <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="torisho" data-color="#FFDD00" data-emoji="☕" data-font="Cookie" data-text="Buy me a coffee" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#ffffff"></script>
</footer>

<script src="./js/pattern.js"></script>
<script src="./js/audio.js"></script>
<script src="./js/ui-grid.js"></script>
<script src="./js/ui-score.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
